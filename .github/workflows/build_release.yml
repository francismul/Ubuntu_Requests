name: Build Android APK

on:
  push:
    tags:
      - "v*.*.*"
  pull_request:

jobs:
  build:
    runs-on: ubuntu-22.04

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            ant \
            autoconf \
            automake \
            ccache \
            cmake \
            g++ \
            gcc \
            git \
            lbzip2 \
            libffi-dev \
            libltdl-dev \
            libtool \
            libssl-dev \
            make \
            openjdk-17-jdk \
            patch \
            pkg-config \
            python3 \
            python3-dev \
            python3-pip \
            python3-venv \
            sudo \
            unzip \
            wget \
            zip

      - name: Set up Java 17
        run: |
          echo "JAVA_HOME=$JAVA_HOME_17_X64" >> $GITHUB_ENV
          echo "$JAVA_HOME_17_X64/bin" >> $GITHUB_PATH
          java -version
          echo "Java setup complete"

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3
        with:
          packages: platform-tools build-tools;28.0.3 platforms;android-27 ndk;25.2.9519653
        env:
          JAVA_HOME: ${{ env.JAVA_HOME }}

      - name: Install Buildozer and p4a
        run: |
          pip install --upgrade pip setuptools wheel
          pip install Cython==0.29.36
          pip install python-for-android
          pip install buildozer

      - name: Accept Android SDK Licenses
        run: |
          echo "Accepting all Android SDK licenses..."
          yes | $ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager --licenses || true
          
          # Ensure build-tools and additional components are installed (using p4a recommended versions)
          $ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager \
            "build-tools;28.0.3" \
            "platform-tools" \
            "platforms;android-27" \
            "ndk;25.2.9519653" || true
          
          # Create legacy SDK tools directory structure for buildozer compatibility
          sudo mkdir -p $ANDROID_HOME/tools/bin
          sudo ln -sf $ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager $ANDROID_HOME/tools/bin/sdkmanager
          sudo ln -sf $ANDROID_HOME/cmdline-tools/latest/bin/avdmanager $ANDROID_HOME/tools/bin/avdmanager
          
          # Verify platform installation
          echo "Verifying Android API 27 installation..."
          ls -la $ANDROID_HOME/platforms/ || echo "No platforms directory"
          
          # Verify SDK manager symlink
          echo "Checking SDK manager paths..."
          ls -la $ANDROID_HOME/tools/bin/sdkmanager || echo "Legacy sdkmanager path not found"
          ls -la $ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager || echo "New sdkmanager path not found"
          
          echo "SDK license acceptance and installation complete"

      - name: Cache .buildozer and .gradle
        uses: actions/cache@v4
        with:
          path: |
            .buildozer
            ~/.gradle
          key: ${{ runner.os }}-buildozer-${{ hashFiles('buildozer.spec') }}
          restore-keys: |
            ${{ runner.os }}-buildozer-

      - name: Build debug APK
        run: |
          # Set environment variables as per p4a documentation
          export ANDROIDSDK="$ANDROID_HOME"
          export ANDROIDNDK="$ANDROID_HOME/ndk/25.2.9519653"
          export ANDROIDAPI="27"
          export NDKAPI="21"
          export ANDROIDNDKVER="25.2.9519653"
          export ANDROID_SDK_ROOT=$ANDROID_HOME
          export ANDROID_NDK_ROOT=$ANDROID_HOME/ndk/25.2.9519653
          
          echo "Building with p4a recommended environment variables:"
          echo "ANDROIDSDK: $ANDROIDSDK"
          echo "ANDROIDNDK: $ANDROIDNDK"
          echo "ANDROIDAPI: $ANDROIDAPI"
          echo "NDKAPI: $NDKAPI"
          echo "ANDROIDNDKVER: $ANDROIDNDKVER"
          
          # Verify SDK setup
          echo "Checking Android SDK structure..."
          ls -la $ANDROID_HOME/build-tools/ || echo "Build tools directory not found"
          ls -la $ANDROID_HOME/platforms/ || echo "Platforms directory not found"
          ls -la $ANDROID_HOME/ndk/ || echo "NDK directory not found"
          
          # Check if API 27 platform exists (recommended by p4a)
          if [ -d "$ANDROID_HOME/platforms/android-27" ]; then
            echo "✓ Android API 27 platform found"
          else
            echo "✗ Android API 27 platform NOT found"
            echo "Available platforms:"
            ls -la $ANDROID_HOME/platforms/ || echo "No platforms found"
          fi
          
          # Verify SDK manager is accessible
          echo "Verifying SDK manager accessibility..."
          if [ -f "$ANDROID_HOME/tools/bin/sdkmanager" ]; then
            echo "✓ Legacy SDK manager path found"
          else
            echo "✗ Legacy SDK manager path NOT found"
          fi
          
          # Clean any previous builds
          rm -rf .buildozer/android/platform/build-*
          
          # Build the APK using buildozer
          buildozer android debug

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: ubuntu-image-fetcher-apk
          path: bin/*.apk

  release:
    needs: build
    runs-on: ubuntu-22.04
    if: always() && needs.build.result == 'success'
    steps:
      - name: Download APK from build
        uses: actions/download-artifact@v4
        with:
          name: ubuntu-image-fetcher-apk
          path: ./bin

      - name: Create Pre-Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: nightly-${{ github.run_number }}-${{ github.event.pull_request.number || 'main' }}
          name: "Nightly Build ${{ github.run_number }} - ${{ github.head_ref || github.ref_name }}"
          body: |
            Automated debug APK build for testing.

            ## Build Information
            - Branch: ${{ github.head_ref || github.ref_name }}
            - Commit: ${{ github.sha }}
            - Run Number: ${{ github.run_number }}
            - Event: ${{ github.event_name }}
            
            ## Installation
            Download the APK file and install it on your Android device.
            
            **Note**: This is a debug build for testing purposes.
          draft: false
          prerelease: true
          files: ./bin/*.apk
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
