name: Build Android APK with Buildozer

on:
  # Manual trigger from Actions tab
  workflow_dispatch:
    inputs:
      build-type:
        description: "Build type: debug or release"
        required: true
        default: debug
        type: choice
        options: [debug, release]
  # Build and publish when pushing a tag like v1.2.3
  push:
    tags:
      - "v*"

  pull_request:

permissions:
  contents: write # needed to create releases and upload assets

jobs:
  build-android:
    name: Build APK (Ubuntu + Buildozer)
    runs-on: ubuntu-22.04

    env:
      # Buildozer caches
      BUILDOZER_CACHE: .buildozer
      GRADLE_USER_HOME: ${{ github.workspace }}/.gradle

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install system dependencies (Buildozer official)
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            git \
            zip \
            unzip \
            openjdk-17-jdk \
            python3-pip \
            autoconf \
            libtool \
            pkg-config \
            zlib1g-dev \
            libncurses5-dev \
            libncursesw5-dev \
            libtinfo5 \
            cmake \
            libffi-dev \
            libssl-dev

      - name: Install optional extras (non-fatal)
        run: |
          sudo apt-get install -y \
            automake \
            ccache \
            gcc \
            g++ \
          || true

      - name: Cache Buildozer and Gradle
        uses: actions/cache@v4
        with:
          path: |
            .buildozer
            .gradle
          key: buildozer-${{ runner.os }}-${{ hashFiles('buildozer.spec') }}
          restore-keys: |
            buildozer-${{ runner.os }}-

      - name: Set up Python virtual environment
        run: |
          python -m venv .venv
          source .venv/bin/activate
          pip install --upgrade buildozer
          pip install --upgrade pip wheel setuptools Cython==0.29.33
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi

      - name: Build APK
        shell: bash
        run: |
          set -e
          source .venv/bin/activate
          # Select build target based on event
          if [ "${{ github.event_name }}" = "push" ] && [[ "${{ github.ref }}" == refs/tags/* ]]; then
            TARGET=release
          else
            TARGET=${{ inputs.build-type || 'debug' }}
          fi

          echo "Building Android $TARGET APK via Buildozer"

          # Ensure buildozer.spec exists
          if [ ! -f buildozer.spec ]; then
            buildozer init
          fi

          # Build
          buildozer android $TARGET

          # Find output APK
          mkdir -p dist
          APK_PATH=$(ls -t bin/*.apk | head -n1)
          if [ -z "$APK_PATH" ]; then
            echo "No APK produced in bin/" >&2
            exit 1
          fi
          cp "$APK_PATH" dist/
          echo "apk_path=dist/$(basename "$APK_PATH")" >> $GITHUB_OUTPUT
        id: build_step

      - name: Upload APK as artifact
        uses: actions/upload-artifact@v4
        with:
          name: android-apk
          path: ${{ steps.build_step.outputs.apk_path }}

      - name: Create GitHub Release (tag push only)
        if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/')
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG_NAME=${GITHUB_REF#refs/tags/}
          RELEASE_NAME="Release ${TAG_NAME}"
          BODY="Automated Buildozer build for ${TAG_NAME}."
          # Create release (idempotent)
          API_URL="https://api.github.com/repos/${{ github.repository }}/releases"
          # Check if release exists
          EXISTING_ID=$(curl -sSL -H "Authorization: Bearer ${GITHUB_TOKEN}" "${API_URL}/tags/${TAG_NAME}" | jq -r '.id // empty')
          if [ -z "$EXISTING_ID" ] || [ "$EXISTING_ID" = "null" ]; then
            RESP=$(curl -sSL -X POST -H "Authorization: Bearer ${GITHUB_TOKEN}" -H "Content-Type: application/json" \
              -d "{\"tag_name\": \"${TAG_NAME}\", \"name\": \"${RELEASE_NAME}\", \"body\": \"${BODY}\", \"draft\": false, \"prerelease\": false}" \
              "${API_URL}")
            RELEASE_ID=$(echo "$RESP" | jq -r '.id')
          else
            RELEASE_ID=$EXISTING_ID
          fi
          echo "release_id=$RELEASE_ID" >> $GITHUB_OUTPUT
        id: create_release

      - name: Upload APK to Release (tag push only)
        if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/')
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -e
          FILE_PATH="${{ steps.build_step.outputs.apk_path }}"
          FILE_NAME=$(basename "$FILE_PATH")
          RELEASE_ID=${{ steps.create_release.outputs.release_id }}
          UPLOAD_URL="https://uploads.github.com/repos/${{ github.repository }}/releases/${RELEASE_ID}/assets?name=${FILE_NAME}"
          curl -sSL -X POST \
            -H "Authorization: Bearer ${GITHUB_TOKEN}" \
            -H "Content-Type: application/vnd.android.package-archive" \
            --data-binary @"$FILE_PATH" \
            "$UPLOAD_URL"
