name: Build Android APK

on:
  push:
    tags:
      - "v*.*.*"
  pull_request:

jobs:
  build:
    runs-on: ubuntu-22.04

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            git zip unzip openjdk-17-jdk python3-pip \
            build-essential libffi-dev libssl-dev \
            libgl1-mesa-dev libgles2-mesa-dev \
            libncurses5 libstdc++6 \
            pkg-config autoconf automake cmake \
            zlib1g zlib1g-dev

      - name: Set up Java 17
        run: |
          echo "JAVA_HOME=$JAVA_HOME_17_X64" >> $GITHUB_ENV
          echo "$JAVA_HOME_17_X64/bin" >> $GITHUB_PATH
          java -version
          echo "Java setup complete"

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3
        with:
          packages: platform-tools build-tools;33.0.2 platforms;android-33 ndk;25.2.9519653
        env:
          JAVA_HOME: ${{ env.JAVA_HOME }}

      - name: Install Buildozer
        run: |
          pip install --upgrade pip setuptools wheel cython
          pip install buildozer

      - name: Accept Android SDK Licenses
        run: |
          echo "Accepting all Android SDK licenses..."
          yes | $ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager --licenses || true
          
          # Ensure build-tools and additional components are installed
          $ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager \
            "build-tools;33.0.2" \
            "platform-tools" \
            "platforms;android-33" \
            "ndk;25.2.9519653" || true
          
          echo "SDK license acceptance and installation complete"

      - name: Cache .buildozer and .gradle
        uses: actions/cache@v4
        with:
          path: |
            .buildozer
            ~/.gradle
          key: ${{ runner.os }}-buildozer-${{ hashFiles('buildozer.spec') }}
          restore-keys: |
            ${{ runner.os }}-buildozer-

      - name: Build debug APK
        run: |
          export ANDROID_SDK_ROOT=$ANDROID_HOME
          export ANDROID_HOME=$ANDROID_HOME
          export ANDROID_NDK_ROOT=$ANDROID_HOME/ndk/25.2.9519653
          echo "Building with ANDROID_SDK_ROOT: $ANDROID_SDK_ROOT"
          echo "Building with ANDROID_HOME: $ANDROID_HOME"
          echo "Building with ANDROID_NDK_ROOT: $ANDROID_NDK_ROOT"
          
          # Verify SDK setup
          echo "Checking Android SDK structure..."
          ls -la $ANDROID_HOME/build-tools/ || echo "Build tools directory not found"
          ls -la $ANDROID_HOME/platforms/ || echo "Platforms directory not found"
          ls -la $ANDROID_HOME/ndk/ || echo "NDK directory not found"
          
          # Build the APK
          buildozer android debug

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: ubuntu-image-fetcher-apk
          path: bin/*.apk

  release:
    needs: build
    runs-on: ubuntu-22.04
    if: github.ref == 'refs/heads/main'
    steps:
      - name: Download APK from build
        uses: actions/download-artifact@v4
        with:
          name: ubuntu-image-fetcher-apk
          path: ./bin

      - name: Create Pre-Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: nightly-${{ github.run_number }}
          name: "Nightly Build ${{ github.run_number }}"
          body: "Automated debug APK build for testing."
          draft: false
          prerelease: true
          files: ./bin/*.apk
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
